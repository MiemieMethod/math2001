name: build and deploy Chinese documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup elan
        run: |
          curl -O --location https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh
          chmod u+x elan-init.sh
          ./elan-init.sh -y --default-toolchain none

      - name: Set elan path
        run: echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install Lean toolchain
        run: lean --version

      - name: Cache Lake build directory
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-lake-${{ hashFiles('lake-manifest.json', 'lean-toolchain') }}-

      - name: Build Lean project
        run: |
          lake exe cache get
          lake build

      - name: Install documentation tooling
        run: python3 -m pip install beautifulsoup4 lxml

      - name: Prepare Chinese documentation
        run: |
          python3 scripts/write_manual_translations.py
          python3 scripts/translate_html_blocks.py apply
          python3 scripts/normalize_chinese_html.py
          python3 scripts/write_translated_sources.py
          python3 scripts/check_chinese_translation.py
          touch html/.nojekyll
          if [ -f the_mechanics_of_proof_zh.pdf ]; then
            cp the_mechanics_of_proof_zh.pdf html/the_mechanics_of_proof_zh.pdf
          fi

      - name: Deploy Chinese documentation to gh-pages
        uses: JamesIves/github-pages-deploy-action@4.1.5
        if: github.event_name == 'push' && github.ref_name == 'main'
        with:
          branch: gh-pages
          folder: html
